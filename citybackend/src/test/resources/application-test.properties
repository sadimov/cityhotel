# Profil "test" — base H2 in-memory en mode compat PostgreSQL.
# MODE=PostgreSQL permet a H2 d'accepter la syntaxe Postgres pour les types/SQL,
# utile car le @FilterDef peut generer du SQL specifique.
# DB_CLOSE_DELAY=-1 garde la base vivante tant que la JVM tourne.
#
# INIT=CREATE SCHEMA IF NOT EXISTS finance\;CREATE SCHEMA IF NOT EXISTS core\;CREATE SCHEMA IF NOT EXISTS client\;CREATE SCHEMA IF NOT EXISTS hebergement
#   - sans cela, Hibernate echoue a creer les tables annotees @Table(schema="finance")
#     ou @Table(schema="core") car H2 ne cree pas automatiquement les schemas
#     references via DDL JPA (alors que Postgres exige un CREATE SCHEMA explicite).
#   - on liste les schemas utilises par les entites scope tenant (finance, client,
#     hebergement) et globales (core : Hotel, DBUser, Role) pour eviter les
#     "Schema not found" repetes au demarrage des @SpringBootTest.
#   - schema 'client' ajoute au Tour 8 (entites Client + Societe).
#   - schema 'hebergement' ajoute au Tour 11 (Reservation, Chambre, Nuitee, ...).
#   - schema 'inventory' ajoute au Tour 16 (Fournisseur, CategorieProduit, Produit,
#     MouvementStock, BonCommande, LigneBonCommande, BonSortie, LigneBonSortie).
#   - schema 'restaurant' ajoute au Tour 23 (CategorieMenu, ArticleMenu - catalogue).
#   - schema 'menage' ajoute au Tour 27 (Personnel, Tache, Planning, Historique).
spring.datasource.url=jdbc:h2:mem:tenanttest;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;INIT=CREATE SCHEMA IF NOT EXISTS finance\\;CREATE SCHEMA IF NOT EXISTS core\\;CREATE SCHEMA IF NOT EXISTS client\\;CREATE SCHEMA IF NOT EXISTS hebergement\\;CREATE SCHEMA IF NOT EXISTS inventory\\;CREATE SCHEMA IF NOT EXISTS restaurant\\;CREATE SCHEMA IF NOT EXISTS menage
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false

spring.liquibase.enabled=false

# Tour 13 : desactive le NightAuditScheduler pendant les tests (cron 11:57/12:00).
# Les tests qui veulent valider le scheduler le ferons en l'instanciant directement
# (pas via @Scheduled).
city.scheduler.enabled=false
