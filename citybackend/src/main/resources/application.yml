spring:
  application:
    name: citybackend
  
  # Configuration de la base de données PostgreSQL
  datasource:
    url: jdbc:postgresql://localhost:5432/cityprojectdb
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver
    # Configuration HikariCP optimisée pour éviter les fuites mémoire
    hikari:
      # Pool de connexions
      minimum-idle: 5                    # Réduire le minimum
      maximum-pool-size: 20              # Réduire le maximum pour le dev
      idle-timeout: 300000               # 5 minutes
      max-lifetime: 1200000              # 20 minutes
      connection-timeout: 20000          # 20 secondes
      leak-detection-threshold: 60000    # 1 minute
      
      # Optimisations pour éviter les fuites
      register-mbeans: false             # Désactiver les MBeans
      allow-pool-suspension: true        # Permettre la suspension du pool
      
      # Configuration de nettoyage
      housekeeping-period-ms: 30000      # Nettoyage toutes les 30 secondes
      
      # Propriétés PostgreSQL spécifiques
      data-source-properties:
        cachePrepStmts: true
        prepStmtCacheSize: 250
        prepStmtCacheSqlLimit: 2048
        useServerPrepStmts: true
        useLocalSessionState: true
        rewriteBatchedStatements: true
        cacheResultSetMetadata: true
        cacheServerConfiguration: true
        elideSetAutoCommits: true
        maintainTimeStats: false
  
  # Configuration JPA/Hibernate
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
        batch_versioned_data: true
    open-in-view: false
  
  # Configuration Liquibase
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true
  
  # Configuration du cache
  cache:
    type: simple
  
  # Configuration des sessions
  session:
    store-type: none
    timeout: 30m
  
  # Configuration Jackson
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Africa/Nouakchott
    default-property-inclusion: NON_NULL

  # Tour A : multipart pour upload avatar profil (limites coordonnees avec
  # AvatarStorageService.MAX_BYTES = 2 MB ; max-request-size legerement plus
  # large pour absorber les headers multipart).
  servlet:
    multipart:
      enabled: true
      max-file-size: 2MB
      max-request-size: 3MB

# Configuration du serveur
server:
  port: 8080
  servlet:
    context-path: /citybackend
    session:
      timeout: 30m
  compression:
    enabled: true
  tomcat:
    max-connections: 200
    threads:
      max: 100
      min-spare: 10

# Configuration de l'application
app:
  jwt:
    # Tour 38 C1 : pas de default — boot fail-fast si JWT_SECRET absent.
    # Doit faire >= 64 caracteres (validation @PostConstruct dans JwtTokenProvider).
    secret: ${JWT_SECRET}
    # Tour 38 C6/C7 : access token court (1h). Refresh token = 7j (refresh-expiration).
    expiration: 3600000  # 1 heure en millisecondes
    refresh-expiration: 604800000  # 7 jours en millisecondes

  cors:
    # Origines autorisées (cohérent avec SecurityConfig.corsConfigurationSource).
    # LAN : `http://192.168.100.141:4200` — déploiement serveur Windows
    # (consigne 2026-05-20). Garder les origines localhost pour dev local.
    # Pour étendre à d'autres machines, surcharger via la variable d'env
    # `APP_CORS_ALLOWED_ORIGINS_0=...` au lancement.
    allowed-origins:
      - http://localhost:3000
      - http://localhost:4200
      - http://192.168.100.141:4200
      - http://192.168.100.141:8080
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    allowed-headers:
      - "*"
    allow-credentials: true
  
  security:
    password:
      min-length: 8
      require-uppercase: true
      require-lowercase: true
      require-digit: true
    session:
      max-sessions-per-user: 3
      concurrent-sessions: 80  # Support pour 80 sessions simultanées

  # Tour A : repertoire de stockage disque des avatars utilisateurs.
  # Override via env AVATARS_DIR en prod (ex. /var/lib/citybackend/avatars).
  uploads:
    avatars:
      dir: ${AVATARS_DIR:./uploads/avatars}

# Configuration du logging
logging:
  level:
    com.cityprojects: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{hotel_id}] [%X{user_id}] %logger{36} - %msg%n"
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level [%X{hotel_id}] [%X{user_id}] %logger{20} - %msg%n"
  file:
    name: logs/citybackend.log

# Configuration de l'actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: WHEN_AUTHORIZED
  metrics:
    export:
      enabled: true

# Tour 38 C10 : rate limiting Resilience4j sur /auth/login + /auth/refresh.
# Le RateLimitFilter cree une instance par IP (cf. RateLimitFilter.java).
# limit-for-period=10 / 60s : 10 tentatives autorisees par fenetre de 60s.
# timeout-duration=0 : aucun blocage cote serveur (rejet immediat 429).
resilience4j:
  ratelimiter:
    instances:
      auth-endpoints:
        limit-for-period: 10
        limit-refresh-period: 60s
        timeout-duration: 0

# Configuration pour les profils
---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/cityprojectdb
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create-drop

# Night audit (Tour 13) — heures paramétrables.
# Valeurs par défaut (production) appliquées si commentées (cf. NightAuditScheduler).
# Décommenter et adapter pour tester rapidement (ex. toutes les 2 minutes).
city:
  night-audit:
    # Alerte 3 min avant l'heure cible (broadcast tous les utilisateurs connectés).
    # Format Spring cron : "sec min hour day month dayOfWeek". Mettre "-" pour désactiver.
    alert-cron: "0 57 11 * * *"
    # Heure cible : ouvre la modale de lancement chez les ADMIN/SUPERADMIN/NIGHTAUDIT.
    # Test rapide : "0 */2 * * * *" = toutes les 2 minutes
    # Test très rapide : "0 * * * * *" = toutes les minutes
    run-cron: "0 0 12 * * *"
    # Midi Temps Universel (GMT / UTC) — consigne user 2026-05-17.
    # ZoneId.of("UTC") équivaut à GMT (offset fixe +00:00, pas de DST).
    timezone: UTC

logging:
  level:
    root: INFO
    com.cityprojects: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:cityprojectdb}
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate

logging:
  level:
    root: WARN
    com.cityprojects: INFO