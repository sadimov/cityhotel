# /etc/nginx/conf.d/default.conf
# Configuration nginx pour servir le bundle Angular city-frontend.
# Le reverse proxy (Traefik) termine TLS — ce nginx interne sert HTTP plain.

# Logs JSON pour ingestion Loki / Promtail
log_format json_combined escape=json
  '{'
    '"time":"$time_iso8601",'
    '"remote_addr":"$remote_addr",'
    '"x_forwarded_for":"$http_x_forwarded_for",'
    '"request":"$request",'
    '"status":$status,'
    '"body_bytes_sent":$body_bytes_sent,'
    '"request_time":$request_time,'
    '"http_referer":"$http_referer",'
    '"http_user_agent":"$http_user_agent"'
  '}';

server {
    listen      80;
    listen      [::]:80;
    server_name _;

    root        /usr/share/nginx/html;
    index       index.html;

    access_log  /var/log/nginx/access.log json_combined;
    error_log   /var/log/nginx/error.log warn;

    # ------- Sécurité headers (Traefik en ajoute aussi, mais défense en profondeur) -------
    add_header X-Content-Type-Options    "nosniff"                 always;
    add_header X-Frame-Options           "SAMEORIGIN"              always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection          "0"                       always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
    # CSP minimale — à ajuster selon CDN externes utilisés (Google Fonts, etc.)
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'self'" always;

    # Compression : utilisée pour les fichiers non pré-compressés
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        application/javascript
        application/json
        application/xml+rss
        application/xml
        application/wasm
        font/ttf
        font/woff
        font/woff2
        image/svg+xml
        text/css
        text/plain
        text/xml;

    # ------- Static assets : cache long + pré-compression -------
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|ico|webp|avif|wasm)$ {
        expires 30d;
        add_header Cache-Control "public, immutable, max-age=2592000";
        access_log off;
        # Servir les versions pré-compressées si elles existent
        gzip_static on;
        # brotli_static on;   # nginx-alpine vanilla n'inclut pas le module brotli — voir image alternative si requis
        try_files $uri =404;
    }

    # ------- index.html : cache court (pour pousser une nouvelle version vite) -------
    location = /index.html {
        expires 1m;
        add_header Cache-Control "public, max-age=60, must-revalidate";
    }

    # ------- assets/i18n : 5 min (changements peu fréquents mais pas immutables) -------
    location ^~ /assets/i18n/ {
        expires 5m;
        add_header Cache-Control "public, max-age=300";
    }

    # ------- SPA routing -------
    # Toute route non trouvée → index.html (Angular Router gère ensuite)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ------- Healthcheck Kubernetes -------
    location = /healthz {
        access_log off;
        add_header Content-Type "text/plain";
        return 200 "ok\n";
    }

    # ------- Sécurité : refuser l'accès aux fichiers sensibles -------
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }
    location = /robots.txt {
        try_files $uri =404;
        access_log off;
    }
}
