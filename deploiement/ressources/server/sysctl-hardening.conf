# /etc/sysctl.d/99-city-hardening.conf
# Hardening kernel pour serveur city-prod en production.
# Appliquer avec : sudo sysctl --system

# === Réseau IPv4 ===
# Anti-spoofing : reverse path filtering
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# Anti SYN flood
net.ipv4.tcp_syncookies = 1
net.ipv4.tcp_max_syn_backlog = 4096
net.ipv4.tcp_synack_retries = 2
net.ipv4.tcp_syn_retries = 5

# Ne pas accepter de redirections ICMP (man-in-the-middle)
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.secure_redirects = 0
net.ipv4.conf.default.secure_redirects = 0
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0

# Ne pas envoyer de redirections (on n'est pas un routeur)
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# Ignorer les broadcasts ICMP (smurf attack)
net.ipv4.icmp_echo_ignore_broadcasts = 1
net.ipv4.icmp_ignore_bogus_error_responses = 1

# Ne pas accepter de source-routed packets
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0
net.ipv6.conf.all.accept_source_route = 0
net.ipv6.conf.default.accept_source_route = 0

# Logger les paquets martiens
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1

# Désactiver IPv6 si non utilisé (commenté par défaut — décommenter si confirmé)
# net.ipv6.conf.all.disable_ipv6 = 1
# net.ipv6.conf.default.disable_ipv6 = 1

# Garbage collect connection tracking plus agressivement
net.netfilter.nf_conntrack_tcp_timeout_established = 600

# === Sécurité système ===
# Empêcher la lecture des pointeurs noyau (mitigation kernel exploits)
kernel.kptr_restrict = 2
kernel.dmesg_restrict = 1
kernel.perf_event_paranoid = 3
kernel.unprivileged_bpf_disabled = 1
kernel.kexec_load_disabled = 1
kernel.yama.ptrace_scope = 2

# Coredumps : ne pas générer pour binaires SUID
fs.suid_dumpable = 0

# Symlinks et hardlinks : protection contre attaques /tmp
fs.protected_symlinks = 1
fs.protected_hardlinks = 1
fs.protected_fifos = 2
fs.protected_regular = 2

# === Performance & mémoire (Postgres / JVM friendly) ===
# Privilégier la RAM, swap rarement (Postgres souffre du swap)
vm.swappiness = 10

# Marges de mémoire avant que l'OOM killer ne se déclenche
vm.overcommit_memory = 1
vm.overcommit_ratio = 50

# Plus de mémoire pour l'I/O cache
vm.dirty_ratio = 15
vm.dirty_background_ratio = 5
vm.dirty_expire_centisecs = 500
vm.dirty_writeback_centisecs = 100

# Augmenter le nombre de fichiers ouvrables (JVM + Postgres)
fs.file-max = 2097152

# Augmenter les limites réseau pour Tomcat / Postgres
net.core.somaxconn = 65535
net.core.netdev_max_backlog = 5000
net.ipv4.tcp_fin_timeout = 15
net.ipv4.tcp_keepalive_time = 600
net.ipv4.tcp_keepalive_intvl = 60
net.ipv4.tcp_keepalive_probes = 3
net.ipv4.tcp_tw_reuse = 1

# Autoriser les conteneurs userns (requis par K3s rootless si activé,
# et certains workflows Docker)
kernel.unprivileged_userns_clone = 1

# === ASLR (déjà actif par défaut, on s'assure) ===
kernel.randomize_va_space = 2
