# Ingress Traefik (intégré K3s) avec cert-manager pour Let's Encrypt automatique.
# Adapter le hostname `city.example.mr` à votre domaine.
#
# Avant d'appliquer :
#   1. Le DNS pointe sur le serveur.
#   2. Le ClusterIssuer letsencrypt-prod existe (cf. letsencrypt-issuer.yaml).
#   3. Les Services city-frontend et city-backend tournent.

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: city-ingress
  namespace: city
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.middlewares: "city-secheaders@kubernetescrd,city-redirect-https@kubernetescrd"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - city.example.mr
      secretName: city-tls
  rules:
    - host: city.example.mr
      http:
        paths:
          - path: /citybackend
            pathType: Prefix
            backend:
              service:
                name: city-backend
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: city-frontend
                port:
                  number: 80

---
# Middleware Traefik : security headers
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: city-secheaders
  namespace: city
spec:
  headers:
    stsSeconds: 31536000
    stsIncludeSubdomains: true
    stsPreload: true
    contentTypeNosniff: true
    browserXssFilter: false
    referrerPolicy: "strict-origin-when-cross-origin"
    frameDeny: true
    customResponseHeaders:
      Permissions-Policy: "geolocation=(), microphone=(), camera=()"
    contentSecurityPolicy: >-
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval';
      style-src 'self' 'unsafe-inline';
      img-src 'self' data: blob:;
      font-src 'self' data:;
      connect-src 'self' https:;
      frame-ancestors 'self'

---
# Middleware Traefik : redirect HTTP → HTTPS
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: city-redirect-https
  namespace: city
spec:
  redirectScheme:
    scheme: https
    permanent: true
