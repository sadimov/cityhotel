apiVersion: v1
kind: ConfigMap
metadata:
  name: city-backend-config
  namespace: city
data:
  # Profil Spring Boot
  SPRING_PROFILES_ACTIVE: "prod"

  # Timezone (cohérent application.yml + Postgres)
  TZ: "Africa/Nouakchott"

  # Connexion DB (le service postgres expose city-postgres:5432 via headless service)
  DB_HOST: "city-postgres"
  DB_PORT: "5432"
  DB_NAME: "cityprojectdb"

  # Mail (à compléter selon SMTP relay réel)
  MAIL_HOST: "smtp.example.mr"
  MAIL_PORT: "587"

  # JVM tuning
  JAVA_TOOL_OPTIONS: >-
    -XX:MaxRAMPercentage=75
    -XX:+UseG1GC
    -XX:+ExitOnOutOfMemoryError
    -Djava.security.egd=file:/dev/./urandom
    -Duser.timezone=Africa/Nouakchott

  # Niveau de log (peut être surchargé par variable LOGGING_LEVEL_ROOT au pod si besoin debug)
  LOGGING_LEVEL_ROOT: "WARN"
  LOGGING_LEVEL_COM_CITYPROJECTS: "INFO"
