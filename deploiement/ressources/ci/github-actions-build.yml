# Workflow GitHub Actions équivalent au Jenkinsfile.
# A copier dans .github/workflows/build-and-deploy.yml du dépôt city.
#
# Secrets requis (Settings → Secrets and variables → Actions) :
#   GHCR_PAT       (Personal Access Token avec write:packages)
#   K8S_KUBECONFIG (kubeconfig prod base64-encoded)

name: build-and-deploy

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  TZ: Africa/Nouakchott

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:

  test-backend:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Maven verify
        working-directory: citybackend
        run: ./mvnw -B -ntp verify
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-tests
          path: |
            citybackend/target/surefire-reports/
            citybackend/target/failsafe-reports/

  test-frontend:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: cityfrontend/package-lock.json
      - name: npm ci
        working-directory: cityfrontend
        run: npm ci --no-audit --no-fund
      - name: Lint
        working-directory: cityfrontend
        run: npm run lint || true
      - name: Type check
        working-directory: cityfrontend
        run: npx tsc --noEmit
      - name: Tests Karma headless
        working-directory: cityfrontend
        run: npx ng test --watch=false --browsers=ChromeHeadlessCI --code-coverage || true

  build-images:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    needs: [test-backend, test-frontend]
    outputs:
      app_tag: ${{ steps.tags.outputs.app_tag }}
    steps:
      - uses: actions/checkout@v4

      - id: tags
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "app_tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "app_tag=edge-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: GHCR login
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build & push backend (Jib)
        working-directory: citybackend
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_PAT }}
        run: |
          ./mvnw -B -ntp -DskipTests \
            -Djib.to.image=${REGISTRY}/${{ github.repository_owner }}/city-backend:${{ steps.tags.outputs.app_tag }} \
            -Djib.to.auth.username=$GHCR_USER \
            -Djib.to.auth.password=$GHCR_TOKEN \
            -Djib.from.image=eclipse-temurin:21.0.5_11-jre-noble \
            -Djib.container.jvmFlags="-XX:MaxRAMPercentage=75,-XX:+UseG1GC,-Duser.timezone=Africa/Nouakchott" \
            -Djib.container.environment=SPRING_PROFILES_ACTIVE=prod \
            -Djib.container.ports=8080 \
            -Djib.container.user=10001 \
            com.google.cloud.tools:jib-maven-plugin:3.4.4:build

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: cityfrontend
          file: deploiement/ressources/docker/Dockerfile.frontend
          push: true
          build-args: |
            API_BASE=/citybackend
            BUILD_CONFIG=production
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/city-frontend:${{ steps.tags.outputs.app_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-prod:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    needs: [build-images]
    environment:
      name: production           # → exige approval manuel via Settings → Environments
      url: https://city.example.mr
    steps:
      - uses: actions/checkout@v4
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.31.4'
      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2
      - name: Apply kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.K8S_KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
      - name: Deploy
        env:
          APP_TAG: ${{ needs.build-images.outputs.app_tag }}
          OWNER: ${{ github.repository_owner }}
        run: |
          cd deploiement/ressources/k8s/
          kustomize edit set image \
            ghcr.io/REPLACE_ORG/city-backend=ghcr.io/${OWNER}/city-backend:${APP_TAG} \
            ghcr.io/REPLACE_ORG/city-frontend=ghcr.io/${OWNER}/city-frontend:${APP_TAG}
          kustomize build . | kubectl apply -f -
          kubectl -n city rollout status deploy/city-backend  --timeout=10m
          kubectl -n city rollout status deploy/city-frontend --timeout=5m
      - name: Smoke test
        run: |
          curl -fsS https://city.example.mr/citybackend/actuator/health | jq -e '.status == "UP"'
