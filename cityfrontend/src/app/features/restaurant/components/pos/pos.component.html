<!--
  POS Restaurant — layout 3 bandes horizontales scrollables.
  A · Détails client / réservation (sticky top, hauteur compacte).
  B · Sélection articles / services (onglets, flex-1).
  C · Panier + récap paiement (horizontal interne).
  Si le contenu déborde, la page scroll verticalement.
-->
<div class="pos-shell">
  <!-- Section A · Détails client / réservation -->
  <section class="pos-shell__client">
    <app-pos-client-header
      (openClientModal)="openClientModal()"
    ></app-pos-client-header>
  </section>

  <!-- Section B · Sélection articles / services (onglets internes) -->
  <section class="pos-shell__catalog">
    <app-pos-article-grid></app-pos-article-grid>
  </section>

  <!-- Section C · Panier + paiement -->
  <section class="pos-shell__cart">
    <app-pos-cart
      (checkoutComptant)="onCheckoutComptant($event)"
      (reportChambre)="onReportChambre()"
      (clearCart)="onClearCart()"
      (pushServices)="onPushServices()"
    ></app-pos-cart>
  </section>

  <!-- Modale sélection client / réservation -->
  <app-pos-client-search
    [open]="clientModalOpen"
    (close)="closeClientModal()"
  ></app-pos-client-search>
</div>
